<!DOCTYPE html>
<html>
<head>
  <title>Pro Trading Platform</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 15px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
    }

    .price {
      font-size: 28px;
      margin: 10px 0;
    }

    input, select {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .buy { background: #16a34a; color: white; }
    .sell { background: #dc2626; color: white; }

    .panel {
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid gray;
      text-align: center;
    }

    #tv_chart {
      height: 450px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h2>Pro Trading App</h2>
  <div>Balance: $ <span id="balance">10000</span></div>
</header>

<div class="container">

  <div class="price">BTC Price: $ <span id="price">Loading...</span></div>

  <select id="type">
    <option value="long">Long</option>
    <option value="short">Short</option>
  </select>

  <input type="number" id="amount" placeholder="Amount ($)" value="100">
  <input type="number" id="leverage" placeholder="Leverage" value="5">

  <button class="buy" onclick="openTrade()">Open Trade</button>

  <div class="panel">
    <h3>Open Positions</h3>
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Entry</th>
          <th>Leverage</th>
          <th>Margin</th>
          <th>PnL</th>
          <th>Liquidation</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="positions"></tbody>
    </table>
  </div>

  <div id="tv_chart"></div>

</div>

<script>
let balance = 10000;
let price = 0;
let positions = [];

const priceEl = document.getElementById("price");
const balanceEl = document.getElementById("balance");
const positionsEl = document.getElementById("positions");

async function fetchPrice() {
  const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
  const data = await res.json();
  price = parseFloat(data.price);
  priceEl.innerText = price.toFixed(2);
  updatePnL();
}

setInterval(fetchPrice, 2000);
fetchPrice();

function openTrade() {
  const type = document.getElementById("type").value;
  const margin = parseFloat(document.getElementById("amount").value);
  const leverage = parseFloat(document.getElementById("leverage").value);

  if (margin > balance) {
    alert("Insufficient Balance");
    return;
  }

  const liquidation = type === "long"
    ? price - (price / leverage)
    : price + (price / leverage);

  balance -= margin;
  balanceEl.innerText = balance.toFixed(2);

  positions.push({
    type,
    entry: price,
    leverage,
    margin,
    liquidation,
    pnl: 0
  });

  renderPositions();
}

function updatePnL() {
  positions.forEach(pos => {
    if (pos.type === "long") {
      pos.pnl = ((price - pos.entry) / pos.entry) * pos.margin * pos.leverage;
    } else {
      pos.pnl = ((pos.entry - price) / pos.entry) * pos.margin * pos.leverage;
    }

    // Liquidation Check
    if ((pos.type === "long" && price <= pos.liquidation) ||
        (pos.type === "short" && price >= pos.liquidation)) {

      alert("Position Liquidated!");
      positions = positions.filter(p => p !== pos);
    }
  });

  renderPositions();
}

function closeTrade(index) {
  balance += positions[index].margin + positions[index].pnl;
  balanceEl.innerText = balance.toFixed(2);
  positions.splice(index, 1);
  renderPositions();
}

function renderPositions() {
  positionsEl.innerHTML = "";
  positions.forEach((pos, index) => {
    positionsEl.innerHTML += `
      <tr>
        <td>${pos.type}</td>
        <td>${pos.entry.toFixed(2)}</td>
        <td>${pos.leverage}x</td>
        <td>$${pos.margin}</td>
        <td style="color:${pos.pnl >= 0 ? 'lime' : 'red'}">
          $${pos.pnl.toFixed(2)}
        </td>
        <td>$${pos.liquidation.toFixed(2)}</td>
        <td><button onclick="closeTrade(${index})">Close</button></td>
      </tr>
    `;
  });
}

// TradingView Professional Chart
new TradingView.widget({
  "width": "100%",
  "height": 450,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "5",
  "timezone": "Asia/Kolkata",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "allow_symbol_change": true,
  "container_id": "tv_chart"
});
</script>

</body>
</html>
